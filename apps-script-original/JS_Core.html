// ===========================================================
// HELPERS DE FILTRO POR UNIDADE ESCOLAR
// Centraliza a lógica de correspondência para cobrir truncamentos
// e variações de escrita (com/sem sufixo após a vírgula).
// Usados por JS_Nav ao receber o dashboard e filtrar os dados
// antes de renderizar qualquer tela.
// ===========================================================
function _unidadeMatchFiltro(nomeUnidade) {
  if (!filtroUnidadeEscola) return true; // sem filtro = exibe tudo
  const u = filtroUnidadeEscola.toUpperCase();
  const n = String(nomeUnidade || '').toUpperCase();
  const uBase = u.split(',')[0].trim();
  const nBase = n.split(',')[0].trim();
  return n === u || nBase === uBase || n.startsWith(uBase) || uBase.startsWith(nBase);
}

function _filtrarArrayPorUnidade(arr) {
  if (!filtroUnidadeEscola || !arr) return arr;
  return arr.filter(r => _unidadeMatchFiltro(r.unit || r.unidade || r.u || ''));
}

function _filtrarDisciplinasTurmasPorUnidade(obj) {
  if (!filtroUnidadeEscola || !obj) return obj;
  const resultado = {};
  Object.keys(obj).forEach(disc => {
    resultado[disc] = _filtrarArrayPorUnidade(obj[disc]);
  });
  return resultado;
}

function _filtrarDashPorUnidade(res) {
  if (!res || !filtroUnidadeEscola) return res;
  return Object.assign({}, res, {
    ppa: _filtrarArrayPorUnidade(res.ppa),
    pra: _filtrarArrayPorUnidade(res.pra),
    disciplinasTurmas: _filtrarDisciplinasTurmasPorUnidade(res.disciplinasTurmas)
  });
}

function _filtrarAlunosPorUnidade(lista) {
  if (!filtroUnidadeEscola || !lista) return lista;
  return lista.filter(a => _unidadeMatchFiltro(a.u || a.unidade || ''));
}

// ===========================================================
// CACHE FRONT — memória + sessionStorage + fila de preload
// ===========================================================
const _cache = {};
const _cacheCallbacks = {};
const _cacheStatus = {};
const _cacheTTL = 1000 * 60 * 45;
const _prefetchQueue = [];
let _prefetchRunning = 0;
const _prefetchMaxConcurrent = 2;

function _cacheStorageKey(chave) {
  return 'MAPA_CACHE_' + String(chave);
}

function _cacheSet(chave, valor) {
  _cache[chave] = valor;
  _cacheStatus[chave] = { loadedAt: Date.now() };

  try {
    sessionStorage.setItem(_cacheStorageKey(chave), JSON.stringify({
      loadedAt: Date.now(),
      data: valor
    }));
  } catch (e) {}
}

function _cacheGet(chave) {
  if (_cache[chave] && _cache[chave] !== 'loading') return _cache[chave];

  try {
    const raw = sessionStorage.getItem(_cacheStorageKey(chave));
    if (!raw) return null;

    const parsed = JSON.parse(raw);
    if (!parsed || !parsed.loadedAt) return null;

    if (Date.now() - parsed.loadedAt > _cacheTTL) {
      sessionStorage.removeItem(_cacheStorageKey(chave));
      return null;
    }

    _cache[chave] = parsed.data;
    _cacheStatus[chave] = { loadedAt: parsed.loadedAt };
    return parsed.data;
  } catch (e) {
    return null;
  }
}

function _cacheIsFresh(chave) {
  const st = _cacheStatus[chave];
  return !!(st && st.loadedAt && Date.now() - st.loadedAt <= _cacheTTL);
}

function _withCache(chave, fetchFn, cb, options) {
  options = options || {};

  const cached = _cacheGet(chave);
  if (cached && !options.force) {
    cb(cached);
    if (!options.refreshBackground || _cacheIsFresh(chave)) return;
  }

  if (!_cacheCallbacks[chave]) _cacheCallbacks[chave] = [];
  _cacheCallbacks[chave].push(cb);

  if (_cache[chave] === 'loading') return;
  _cache[chave] = 'loading';

  fetchFn(data => {
    _cacheSet(chave, data);
    (_cacheCallbacks[chave] || []).forEach(fn => {
      try { fn(data); } catch (e) { console.error('Erro em callback de cache:', e); }
    });
    _cacheCallbacks[chave] = [];
  });
}

function _preload(chave, fetchFn, prioridade) {
  if (_cacheGet(chave) || _cache[chave] === 'loading') return;

  _prefetchQueue.push({
    chave,
    fetchFn,
    prioridade: prioridade || 50
  });

  _prefetchQueue.sort((a, b) => a.prioridade - b.prioridade);
  _rodarFilaPreload();
}

function _rodarFilaPreload() {
  if (_prefetchRunning >= _prefetchMaxConcurrent || !_prefetchQueue.length) return;

  const job = _prefetchQueue.shift();
  if (!job) return;

  if (_cacheGet(job.chave)) {
    setTimeout(_rodarFilaPreload, 50);
    return;
  }

  if (_cache[job.chave] === 'loading') {
    setTimeout(_rodarFilaPreload, 50);
    return;
  }

  _prefetchRunning++;
  _cache[job.chave] = 'loading';

  try {
    job.fetchFn(data => {
      _cacheSet(job.chave, data);

      // IMPORTANTE: quando uma tela chama _withCache enquanto o preload já está
      // carregando a mesma chave, o callback fica em _cacheCallbacks.
      // Sem este bloco, a tela pode ficar presa em "Carregando..." para sempre.
      const pendentes = _cacheCallbacks[job.chave] || [];
      pendentes.forEach(fn => {
        try { fn(data); } catch (e) { console.error('Erro em callback de preload:', e); }
      });
      _cacheCallbacks[job.chave] = [];

      _prefetchRunning--;
      setTimeout(_rodarFilaPreload, 60);
    });
  } catch (e) {
    console.error('Erro preload:', e);
    delete _cache[job.chave];

    const pendentes = _cacheCallbacks[job.chave] || [];
    pendentes.forEach(fn => {
      try { fn({ ok: false, erro: String(e) }); } catch (err) { console.error('Erro em callback de preload:', err); }
    });
    _cacheCallbacks[job.chave] = [];

    _prefetchRunning--;
    setTimeout(_rodarFilaPreload, 150);
  }
}

function limparCacheFrontPorPrefixo(prefixo) {
  Object.keys(_cache).forEach(k => {
    if (String(k).startsWith(prefixo)) {
      delete _cache[k];
      delete _cacheStatus[k];
      try { sessionStorage.removeItem(_cacheStorageKey(k)); } catch (e) {}
    }
  });

  try {
    Object.keys(sessionStorage).forEach(k => {
      if (k.indexOf('MAPA_CACHE_' + prefixo) === 0) sessionStorage.removeItem(k);
    });
  } catch (e) {}
}

function limparTodoCacheFront() {
  Object.keys(_cache).forEach(k => delete _cache[k]);
  Object.keys(_cacheStatus).forEach(k => delete _cacheStatus[k]);

  try {
    Object.keys(sessionStorage).forEach(k => {
      if (k.indexOf('MAPA_CACHE_') === 0) sessionStorage.removeItem(k);
    });
  } catch (e) {}
}

// ===========================================================
// HELPERS GERAIS
// ===========================================================
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>'"]/g, c => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    "'": '&#39;',
    '"': '&quot;'
  }[c]));
}

function escapeJs(s) {
  return String(s ?? '')
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/\n/g, ' ');
}

function padronizar(texto) {
  if (!texto || texto === '-') return 'Sem Dado';
  let t = String(texto).trim();
  if (t.includes(' - ')) t = t.split(' - ')[0].trim();
  return t || 'Sem Dado';
}

function normalizarTextoSemAcento(txt) {
  return String(txt || '')
    .trim()
    .toUpperCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '');
}

function normalizarAnoFiltroFront(ano) {
  if (!ano || ano === 'TODOS') return 'TODOS';
  const n = String(ano).match(/[1-5]/);
  return n ? `${n[0]} ANO` : 'TODOS';
}

function numeroAnoFront(ano) {
  const n = String(ano || '').match(/[1-5]/);
  return n ? n[0] : '';
}

function isCritico(texto) {
  const t = normalizarTextoSemAcento(texto);
  return t.includes('PRE') || t.includes('N1') || t.includes('NIVEL 1') ||
         t.includes('NAO PRODUZ') || t === 'NAO';
}

function isFluente(texto) {
  const t = normalizarTextoSemAcento(texto);
  return t.includes('FLUENTE') || t.includes('ORTOGR') || t.includes('NIVEL 5') || t === 'SIM';
}

  '#FFFF8D', '#FF9E80', '#A7FFEB', '#CFD8DC'
];

const _coresUsadas = new Set(Object.values(COR_FIXA));
const _rotuloParaCor = {};
let _postitIdx = 0;

function _normalizarRotuloCor(rotulo) {
  const r = String(rotulo || '').trim();
  const n = normalizarTextoSemAcento(r);
  if (!r) return 'Sem Dado';
  if (n === 'X' || n.includes('NAO AVAL')) return 'Não Avaliado';
  if (n === 'S' || n === 'SIM') return 'Sim';
  if (n === 'N' || n === 'NAO') return 'Não';
  return r;
}

function _proximaCorPostit() {
  while (_postitIdx < PALETA_POSTIT.length) {
    const cor = PALETA_POSTIT[_postitIdx++];
    if (!_coresUsadas.has(cor)) {
      _coresUsadas.add(cor);
      return cor;
    }
  }
  const cor = `hsl(${(_postitIdx++ * 47) % 360},90%,55%)`;
  _coresUsadas.add(cor);
  return cor;
}

function getCorParaRotulo(rotulo) {
  const r = _normalizarRotuloCor(rotulo);
  if (COR_FIXA[r]) return COR_FIXA[r];
  if (!_rotuloParaCor[r]) _rotuloParaCor[r] = _proximaCorPostit();
  return _rotuloParaCor[r];
}

function getDynamicColor(t) { return getCorParaRotulo(t); }
function getChartColorAlunos(t) { return getCorParaRotulo(t); }

function getTextColor(hex) {
  const h = String(hex || '').trim();
  if (h.startsWith('hsl')) return '#000000';
  const clean = h.replace('#', '');
  if (clean.length !== 6) return '#000000';
  const r = parseInt(clean.substr(0, 2), 16);
  const g = parseInt(clean.substr(2, 2), 16);
  const b = parseInt(clean.substr(4, 2), 16);
  return ((r * 299 + g * 587 + b * 114) / 1000) > 155 ? '#000000' : '#ffffff';
}

  if (pct >= 40) return { texto: 'Alerta', cor: '#FFB300', textoCor: '#000000', classe: 'alerta', mensagem: 'Resultado em atenção. Precisa de acompanhamento.' };
  return { texto: 'Crítico', cor: '#FF4757', textoCor: '#ffffff', classe: 'critico', mensagem: 'Resultado crítico. Priorizar intervenção pedagógica.' };
}

function htmlStatusAdequacao(pct) {
  const st = statusAdequacao(pct);
  return `<span title="${escapeHtml(st.mensagem)}" class="status-chip ${st.classe}" style="background:${st.cor};color:${st.textoCor};">Adequação ${pct}% · ${st.texto}</span>`;
}

function calcularAdequacaoDetalhada(labels, values) {
  const total = (values || []).reduce((a, b) => a + Number(b || 0), 0);
  const partes = [];
  let qtdAdeq = 0;

  (labels || []).forEach((label, i) => {
    const valor = Number((values || [])[i] || 0);
    if (ehRespostaAdequada(label)) {
      qtdAdeq += valor;
      partes.push({
        label,
        valor,
        pct: total ? Math.round((valor / total) * 100) : 0
      });
    }
  });

  return {
    total,
    qtdAdeq,
    pct: total ? Math.round((qtdAdeq / total) * 100) : 0,
    partes
  };
}

        <b>Adequação ${info.pct || 0}% · ${escapeHtml(st.texto)}</b> = ${formula}.
      </div>
      <div style="margin-top:3px;color:#64748b;">
        Esse indicador soma somente os níveis considerados adequados para este eixo. O gráfico acima continua mostrando a distribuição completa de todos os níveis.
      </div>
    </div>
  `;
}

function ehRespostaAdequada(rotulo) {
  return new Set(['Sim', 'Nível 4', 'Nível 5', 'Ortográfica', 'Alfabética', 'L. Fluente', 'L. Iniciante', 'Autônomo']).has(_normalizarRotuloCor(rotulo));
}

const PREFETCH_ANOS = ['TODOS', '1 ANO', '2 ANO', '3 ANO', '4 ANO', '5 ANO'];
const PREFETCH_BIMS = ['primeiroBimestre', 'segundoBimestre', 'terceiroBimestre', 'quartoBimestre'];

function _filtroBasePrefetch(ano, unidade, turma) {
  return { unidade: unidade || 'TODAS', ano: ano || 'TODOS', turma: turma || 'TODAS' };
}

function _prefetchPacoteBimestre(key, filtrosBase, prioridade) {
  if (!key) return;
  filtrosBase = filtrosBase || { ano: 'TODOS' };
  _preload(
    _chavePacoteBimestre(key, filtrosBase),
    cb => google.script.run
      .withSuccessHandler(r => cb(r))
      .withFailureHandler(err => {
        console.error('Prefetch pacote bimestre:', key, filtrosBase, err);
        cb({ ok: false, linhas: [], arvore: {}, disciplinas: [] });
      })
      .getPacoteBimestreRapido(key, filtrosBase),
    prioridade || 10
  );
}

// Alias mantido para compatibilidade com chamadas antigas.
function _prefetchBimestreCompleto(key, prioridade) {
  _prefetchPacoteBimestre(key, { ano: 'TODOS' }, prioridade || 10);
}

function _prefetchBimestreFiltro(key, filtros, prioridade) {
  _preload(

      .getAvaliacaoBimestreRapida(key, filtros),

  );
}

function _prefetchHierarquiaBimestre(key, prioridade) {

      .withFailureHandler(err => { console.error('Prefetch hierarquia:', key, err); cb({ ok: false, arvore: {} }); })
      .getHierarquiaBimestre(key, {}),
    prioridade || 15
  );
}

function _prefetchTotalFiltro(filtros, prioridade) {
  _preload(
    _chaveTotal(filtros),
    cb => google.script.run
      .withSuccessHandler(r => cb(r))
      .withFailureHandler(err => { console.error('Prefetch total:', err); cb({ ok: false, linhas: [] }); })
      .getTotalAvaliacoesRapido(filtros),
    prioridade || 50
  );
}

function _prefetchHierarquiaTotal(ano, prioridade) {
  const anoNorm = ano || 'TODOS';
  _preload(
    _chaveHierarquiaTotal(anoNorm),
    cb => google.script.run
      .withSuccessHandler(r => cb(r))
      .withFailureHandler(err => { console.error('Prefetch hier total:', err); cb({ ok: false, arvore: {} }); })
      .getHierarquiaTotal({ ano: anoNorm }),
    prioridade || 40
  );
}

function preAquecerFiltroBimestre(unidade, turma) {
  _prefetchPacoteBimestre(
    bimestreAtualKey,
    { ano: bimestreAtualKey === 'primeiroBimestre' ? 'TODOS' : (anoFiltroAtual || 'TODOS') },
    1
  );
}

function preAquecerFiltroTotal(unidade, turma) {
  _prefetchTotalFiltro(_filtroBasePrefetch(anoFiltroAtual || 'TODOS', unidade || 'TODAS', turma || 'TODAS'), 1);
}

function preCarregarTudoEmSegundoPlano() {
  // Preload enxuto para não competir com a Diagnóstica.
  // O 1º Bimestre continua quase instantâneo; o Total é aquecido logo depois.
  _prefetchPacoteBimestre('primeiroBimestre', { ano: 'TODOS' }, 1);

  setTimeout(() => {
    _prefetchPacoteTotal({ ano: 'TODOS' }, 6);
  }, 1400);

  // Demais bimestres ficam para depois, sem disputar rede com Diagnóstica/Total.
  setTimeout(() => {
    ['segundoBimestre', 'terceiroBimestre', 'quartoBimestre'].forEach((key, idx) => {
      _prefetchPacoteBimestre(key, { ano: 'TODOS' }, 30 + idx);
    });
  }, 4500);
}

function preAquecerMenuAoPassarMouse(tipo) {
  if (!tipo || tipo === 'AnoEscolar') return;
  if (tipo === 'Total') {
    const anoAtual = _anoFiltroAtualSeguro();
    _prefetchPacoteTotal({ ano: anoAtual }, 1);
    _prefetchPacoteTotal({ ano: 'TODOS' }, 2);
    _prefetchTotalFiltro(_filtroBasePrefetch(anoAtual, 'TODAS', 'TODAS'), 5);
    _prefetchHierarquiaTotal(anoAtual, 5);
    return;
  }
  _prefetchPacoteBimestre(tipo, { ano: tipo === 'primeiroBimestre' ? 'TODOS' : (anoFiltroAtual || 'TODOS') }, 1);
}

// TOTAL LOCAL PACKAGE + ANO SEGURO
// ===========================================================
function _anoFiltroAtualSeguro() {
  const ativo = document.querySelector('#anoFilterBar .btn-ano.active');
  if (ativo) return normalizarAnoFiltroFront(ativo.innerText || ativo.textContent || 'TODOS');
  return normalizarAnoFiltroFront(anoFiltroAtual || 'TODOS');
}

function _setAnoFiltroAtualSeguro(ano, btn) {
  anoFiltroAtual = normalizarAnoFiltroFront(ano || 'TODOS');
  document.querySelectorAll('#anoFilterBar .btn-ano').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else {
    document.querySelectorAll('#anoFilterBar .btn-ano').forEach(b => {
      const txt = String(b.innerText || '').toUpperCase();
      if ((anoFiltroAtual === 'TODOS' && txt.includes('TODOS')) ||
          (anoFiltroAtual !== 'TODOS' && txt.includes(anoFiltroAtual.charAt(0)))) {
        b.classList.add('active');
      }
    });
  }
  const sel = document.getElementById('filtroAvAno');
  if (sel) {
    const existe = [...sel.options].some(o => o.value === anoFiltroAtual);
    if (!existe && anoFiltroAtual !== 'TODOS') {
      sel.insertAdjacentHTML('beforeend', `<option value="${escapeHtml(anoFiltroAtual)}">${escapeHtml(anoFiltroAtual)}</option>`);
    }
    sel.value = anoFiltroAtual;
  }
  return anoFiltroAtual;
}

function _chavePacoteTotal(filtrosBase) {
  filtrosBase = filtrosBase || {};
  return ['pacoteTotal', filtrosBase.ano || 'TODOS'].join('|');
}

function _backendTemPacoteTotal() {
  // Em Apps Script, a lista de funções do google.script.run pode variar por implantação.
  // Para produção, NÃO dependemos mais de getPacoteTotalRapido no front.
  // O pacote do Total é solicitado pela função estável getTotalAvaliacoesRapido({__pacote:true}).
  return false;
}

function _prefetchPacoteTotal(filtrosBase, prioridade) {
  filtrosBase = filtrosBase || { ano: 'TODOS' };

  const ano = filtrosBase.ano || 'TODOS';
  const payload = Object.assign({}, filtrosBase, { __pacote: true });

  _preload(
    _chavePacoteTotal({ ano }),
    cb => google.script.run
      .withSuccessHandler(r => cb(r))
      .withFailureHandler(err => {
        console.error('Prefetch Total via getTotalAvaliacoesRapido:', err);
        cb({ ok: false, linhas: [] });
      })
      .getTotalAvaliacoesRapido(payload),
    prioridade || 35
  );
}
