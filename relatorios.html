<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <script src="auth-guard.js"></script>

  <script src="auth.js" defer></script>
  <script src="config-central.js" defer></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Relatórios de Acompanhamento</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    /* ── Variáveis ── */
    :root {
      --primary: #002b5e;
      --neon-green: #39FF14;
      --neon-pink: #FF007F;
      --neon-yellow: #FFD300;
      --neon-blue: #00e5ff;
      --bg: #f0f4f8;
    }
    body { background-color: var(--bg); font-family: 'Inter', sans-serif; padding-bottom: 50px; min-height: 100vh; display: flex; flex-direction: column; }
    /* ── Cabeçalho global MAPA (igual ao atribuicao.html) ── */
    .mg-header { background: var(--primary, #002b5e); color: #fff; border-bottom: 5px solid var(--neon-blue, #00e5ff); padding: .95rem 1.6rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; position: sticky; top: 0; z-index: 1050; box-shadow: 0 6px 18px rgba(0,43,94,.18); }
    .mg-brand { display: flex; align-items: center; gap: .6rem; min-width: 180px; }
    .mg-brand-icon { width: 34px; height: 34px; display: grid; place-items: center; color: var(--neon-blue, #00e5ff); font-size: 1.4rem; filter: drop-shadow(0 0 6px rgba(0,229,255,.55)); }
    .mg-brand h4 { margin: 0; font-weight: 900; letter-spacing: .03em; font-size: 1.4rem; line-height: 1; }
    .mg-brand-sub { font-size: .63rem; color: rgba(255,255,255,.68); font-weight: 800; letter-spacing: .08em; text-transform: uppercase; margin-top: 2px; }
    .mg-nav { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; flex: 1; min-width: 280px; }
    .mg-nav-btn { display: inline-flex; align-items: center; gap: .4rem; justify-content: center; min-width: 150px; font-size: .78rem; font-weight: 900; padding: 6px 14px; border-radius: 8px; border: 2px solid transparent; color: #fff; text-decoration: none; transition: .2s; white-space: nowrap; }
    .mg-nav-btn:hover { border-color: rgba(255,255,255,.4); }
    .mg-nav-btn.active { background: #fff; color: var(--primary, #002b5e); box-shadow: 0 2px 10px rgba(0,0,0,.18); }
    .mg-actions { min-width: 86px; display: flex; justify-content: flex-end; align-items: center; }
    .mg-action-btn { display: inline-flex; align-items: center; gap: .35rem; font-size: .76rem; font-weight: 800; padding: 5px 12px; border-radius: 8px; border: 1.5px solid rgba(255,255,255,.45); background: transparent; color: #fff; cursor: pointer; transition: .2s; }
    .mg-action-btn:hover { background: rgba(255,255,255,.12); border-color: #fff; }
    @media (max-width: 992px) { .mg-nav-btn { min-width: auto; } }
    .nav-header { background: var(--primary); color: white; padding: 1.2rem 2rem; border-bottom: 5px solid var(--neon-blue); z-index: 1040; }
    .btn-toggle { border: 2px solid var(--neon-blue); color: white; font-weight: 700; margin-right: 10px; border-radius: 8px; transition: 0.3s; background: transparent; padding: 6px 16px; }
    .btn-toggle:hover { background: rgba(0,229,255,0.1); color: white; }
    .btn-toggle.active { background: var(--neon-blue); color: var(--primary); box-shadow: 0 0 12px var(--neon-blue); }
    .tab-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; border-radius: 20px; background: var(--neon-pink); color: white; font-size: 0.7rem; font-weight: 800; padding: 0 6px; margin-left: 6px; }
    .card-kpi { border: none; border-radius: 12px; background: white; padding: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .chart-container { background: white; border-radius: 15px; padding: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .table-container { background: white; border-radius: 15px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .btn-action { font-weight: 700; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; transition: 0.2s; border-radius: 8px; }
    .btn-action-primary { background-color: var(--primary); color: white; border: 1px solid var(--primary); }
    .btn-action-primary:hover { background-color: #001a3d; color: white; box-shadow: 0 4px 10px rgba(0,43,94,0.3); transform: scale(1.02); }
    .btn-action-ia { background-color: white; color: var(--primary); border: 2px solid var(--neon-blue); }
    .btn-action-ia:hover { background-color: var(--neon-blue); color: var(--primary); box-shadow: 0 0 10px var(--neon-blue); transform: scale(1.02); }
    .layout-wrapper { display: flex; gap: 1.5rem; padding: 1.5rem; max-width: 1600px; margin: 0 auto; width: 100%; align-items: flex-start; }
    aside { width: 300px; flex-shrink: 0; position: sticky; top: calc(80px + 1.5rem); display: flex; flex-direction: column; gap: 1rem; }
    main { flex-grow: 1; min-width: 0; }
    .sel-bar { background: #f8faff; border: 1px solid var(--neon-blue); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
    .sel-bar-titulo { font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; }
    #contadorSel { font-size: 0.85rem; font-weight: 700; color: var(--neon-pink); }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.25rem; }
    /* ── Agrupamento por regional ── */
    .regional-group { background:#fff; border-radius:14px; box-shadow:0 4px 14px rgba(0,0,0,.05); margin-bottom:16px; overflow:hidden; }
    .regional-group-header { display:flex; align-items:center; gap:10px; padding:13px 18px; cursor:pointer; border-left:5px solid var(--neon-blue); transition:.15s; user-select:none; }
    .regional-group-header:hover { background:#f8faff; }
    .regional-group-nome { font-weight:900; color:var(--primary); font-size:1rem; }
    .regional-group-meta { font-size:.75rem; font-weight:700; color:#64748b; }
    .regional-group-chevron { margin-left:auto; color:#94a3b8; transition:transform .2s; }
    .regional-group-header.collapsed .regional-group-chevron { transform:rotate(-90deg); }
    .regional-group-body { padding:0 18px 18px; }
    .rel-card { cursor: pointer; transition: all 0.2s ease; border: 2px solid transparent; position: relative; display: flex; flex-direction: column; gap: 10px; }
    .rel-card:hover { border-color: var(--neon-blue); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
    .rel-card.selecionado { border-color: var(--neon-pink); background-color: #fffafc; box-shadow: 0 0 0 3px rgba(255,0,127,0.1); }
    .card-checkbox-wrap { position: absolute; top: 15px; right: 15px; z-index: 2; }
    .card-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: var(--neon-pink); }
    .card-title-escola { font-weight: 800; font-size: 0.95rem; color: var(--primary); line-height: 1.2; padding-right: 30px; }
    .card-meta-info { font-size: 0.75rem; font-weight: 600; color: #6c757d; }
    .estado { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 2rem; text-align: center; color: #adb5bd; }
    .estado i { font-size: 3rem; margin-bottom: 1rem; color: #dee2e6; }
    .estado p { font-weight: 600; font-size: 1.1rem; }
    .spinner-wrapper { display: flex; justify-content: center; padding: 4rem; }
    #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 12px 25px; border-radius: 30px; font-weight: 700; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 25px rgba(0,43,94,0.3); border: 2px solid var(--neon-green); opacity: 0; pointer-events: none; transition: 0.3s; z-index: 9999; }
    #toast.visivel { opacity: 1; transform: translateX(-50%) translateY(-10px); }
    .search-wrap { position: relative; }
    .search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #adb5bd; }
    .search-wrap input { padding-left: 36px; font-weight: 500; }
    @media (max-width: 768px) { .layout-wrapper { flex-direction: column; } aside { width: 100%; position: static; } }
    /* ── Abas + opções de PDF dentro do modal ── */
    .modal-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .modal-tabs .nav-link { border: 2px solid #cbd5e1; background: #fff; color: #334155; font-weight: 800; font-size: 0.85rem; padding: 7px 18px; border-radius: 999px; cursor: pointer; display: inline-flex; align-items: center; transition: .15s; }
    .modal-tabs .nav-link:hover { border-color: var(--primary); }
    .modal-tabs .nav-link.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .pdf-opt { display: inline-flex; align-items: center; gap: 6px; font-size: 0.82rem; font-weight: 700; color: #334155; cursor: pointer; margin: 0; }
    .pdf-opt input { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
    /* ── Estatísticas / cobertura ── */
    .est-kpis-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(132px, 1fr)); gap:.85rem; }
    .est-kpi { background:#fff; border-radius:14px; padding:.9rem 1.1rem; box-shadow:0 4px 14px rgba(0,0,0,.05); border-left:5px solid var(--primary); height:100%; }
    .est-kpi .lbl { font-size:.66rem; font-weight:800; color:#64748b; text-transform:uppercase; letter-spacing:.03em; }
    .est-kpi .val { font-size:1.7rem; font-weight:900; color:var(--primary); line-height:1.1; }
    .est-kpi.ok    { border-left-color:#10b981; } .est-kpi.ok .val    { color:#047857; }
    .est-kpi.warn  { border-left-color:#ef4444; } .est-kpi.warn .val  { color:#b91c1c; }
    .est-kpi.info  { border-left-color:var(--neon-blue); }
    .est-kpi.dev   { border-left-color:var(--neon-pink); } .est-kpi.dev .val { color:#be185d; }
    .est-kpi.clic  { cursor:pointer; transition:transform .12s, box-shadow .12s; }
    .est-kpi.clic:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,.12); }
    .est-kpi.ativo { box-shadow:0 0 0 3px rgba(0,43,94,.30), 0 4px 14px rgba(0,0,0,.06); }
    table.tbl-cob { width:100%; font-size:.84rem; border-collapse:collapse; }
    table.tbl-cob thead th { position:sticky; top:0; background:var(--primary); color:#fff; font-weight:800; font-size:.68rem; text-transform:uppercase; letter-spacing:.02em; padding:9px 10px; white-space:nowrap; cursor:pointer; }
    table.tbl-cob tbody td { padding:7px 10px; border-bottom:1px solid #eef2f7; }
    table.tbl-cob tbody tr:hover { background:#f1f6ff; }
    .pill { font-weight:800; font-size:.66rem; padding:3px 9px; border-radius:999px; white-space:nowrap; }
    .pill-ok   { background:#d1fae5; color:#047857; }
    .pill-no   { background:#fee2e2; color:#b91c1c; }
    .pill-dev  { background:#fce7f3; color:#be185d; }
    /* ── Área de impressão / PDF ── */
    #print-area { display: none; }
    .pdf-cab { display:flex; align-items:baseline; gap:12px; border-bottom:3px solid var(--primary); padding-bottom:10px; margin-bottom:20px; flex-wrap:wrap; }
    .pdf-cab-marca { font-weight:900; font-size:1.35rem; color:var(--primary); letter-spacing:.02em; }
    .pdf-cab-marca i { color:var(--neon-blue); margin-right:4px; }
    .pdf-cab-marca span { font-size:.7rem; font-weight:800; color:#64748b; letter-spacing:.04em; }
    .pdf-cab-sub { font-size:.78rem; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:#475569; }
    .pdf-cab-data { margin-left:auto; font-size:.7rem; color:#94a3b8; font-family:monospace; }
    .pdf-rodape { margin-top:22px; padding-top:10px; border-top:1px solid #e2e8f0; font-size:.66rem; color:#94a3b8; display:flex; justify-content:space-between; }
    @page { size: A4; margin: 14mm 13mm; }
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      html, body { background:#fff !important; }
      body > *:not(#print-area) { display: none !important; }
      #print-area { display: block !important; font-family:'Inter',sans-serif; color:#1e293b; }
      .pdf-sec { page-break-after: always; font-size: 10.5pt; line-height: 1.45; }
      .pdf-sec:last-child { page-break-after: auto; }
      .pdf-sec ul { page-break-inside: avoid; }
      a[href]:after { content: ''; }
    }
  </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script>
// ── Configuração ──
const COL_REGIONAL = "Marque a Regional a qual pertente a unidade escolar.";
const COLS_FICHA = [
  "Carimbo de data/hora","Data da Visita:","Data da visita:",
  "Assinale o período da visita.",
  "Nome(s) do(s) responsável(is) pelo acompanhamento pedagógico.",
  "Endereço de e-mail",
  COL_REGIONAL
];
const ROTULOS = {
  "Carimbo de data/hora":"Enviado em",
  "Data da Visita:":"Data da visita",
  "Data da visita:":"Data da visita",
  "Assinale o período da visita.":"Período",
  "Nome(s) do(s) responsável(is) pelo acompanhamento pedagógico.":"Responsável(is)",
  "Endereço de e-mail":"E-mail"
};

// ── Estado global ──
let dadosPorSegmento = { fundamental: [], infantil: [] };
let isAdmin = false;
let estaLogado = false;
let emailUsuario = '';
let escolasOficiais = { fundamental: [], infantil: [] };
let mapaRegionalOficial = { fundamental: {}, infantil: {} };
let segmentoAtual = 'fundamental';
let secaoAtual = 'fundamental';
let todos = [], filtrados = [], selecionados = new Set();
let todasDevolutivas = [], devolutivasFiltradas = [];
let devolutivasCarregadas = false;
let mapaDevolutivas = new Map();

// ── Índice visita ↔ devolutiva (chave: segmento|escola|data) ──
function _chaveDev(seg, escola, data) {
  return (String(seg||'') + '|' + String(escola||'') + '|' + String(data||''))
    .toLowerCase().replace(/\s+/g, ' ').trim();
}
function _construirMapaDevolutivas() {
  mapaDevolutivas = new Map();
  todasDevolutivas.forEach(d => {
    mapaDevolutivas.set(_chaveDev(d["Segmento"], d["Escola"], d["Data da Visita"]), d);
  });
}
function _devDoItem(item) {
  const data = item["Data da Visita:"]||item["Data da visita:"]||'';
  return mapaDevolutivas.get(_chaveDev(segmentoAtual, item['_ESCOLA_'], data));
}

// ── Toast ──
function mostrarToast(msg) {
  const el = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  el.classList.add('visivel');
  setTimeout(() => el.classList.remove('visivel'), 3000);
}

// ── Utilitários ──
function escapar(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function mostrarEstado(msg, icone) {
  document.getElementById('main').innerHTML = `<div class="estado"><i class="bi ${icone}"></i><p>${msg}</p></div>`;
}

// ── Navegação ──
function mudarSecao(sec) {
  secaoAtual = sec;
  ['fundamental','infantil','devolutivas','estatisticas'].forEach(t => {
    const b = document.getElementById('tab-'+t);
    if (b) b.classList.toggle('active', t === sec);
  });
  const aP = document.getElementById('aside-principal');
  const aD = document.getElementById('aside-dev');
  const aE = document.getElementById('aside-estatisticas');
  aP.style.display = 'none'; aD.style.display = 'none'; aE.style.display = 'none';
  document.getElementById('badgeCount').style.display = 'none';
  if (sec === 'devolutivas') {
    aD.style.display = 'flex'; carregarDevolutivas();
  } else if (sec === 'estatisticas') {
    aE.style.display = 'flex'; renderEstatisticas();
  } else {
    aP.style.display = 'flex'; mudarSegmento(sec);
  }
}

// ── URL da API (Google Apps Script) ──
const API_URL = 'https://script.google.com/macros/s/AKfycbydArqsFE8fCijWuc_st3Kd3jbQaUWRyEnQja-Nh2dOaKueuV_jX0iaDyToMKRXjKHO/exec';

// ── Carregamento ──
function carregarDados() {
  document.getElementById('main').innerHTML = '<div class="spinner-wrapper"><div class="spinner-border text-primary" role="status" style="width:3rem;height:3rem;"></div></div>';

  // Detecta se está rodando em Google Apps Script ou como arquivo estático
  if (typeof google !== 'undefined' && google.script) {
    // Modo Google Apps Script
    google.script.run.withSuccessHandler(onDados).withFailureHandler(onErro).getDadosCompletos();
  } else {
    // Modo externo: faz fetch para a API do Apps Script
    chamarAPI('getDados')
      .then(res => {
        if (res.ok || res.fundamental) {
          onDados(res);
        } else {
          console.warn('⚠️ Erro ao carregar dados reais. Usando dados de teste.');
          onDados(_dadosMock());
        }
      })
      .catch(err => {
        console.warn('⚠️ Não conseguiu conectar à API. Usando dados de teste.', err);
        onDados(_dadosMock());
      });
  }
}

// ── Função auxiliar para chamar API ──
async function chamarAPI(action, params = {}) {
  try {
    const url = new URL(API_URL);
    url.searchParams.append('action', action);
    Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));

    // text/plain evita o preflight CORS (OPTIONS) que o Apps Script não responde
    const response = await fetch(url.toString(), {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }
    });

    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return await response.json();
  } catch(err) {
    console.error('Erro ao chamar API:', err);
    throw err;
  }
}

function _dadosMock() {
  return {
    fundamental: [
      { "_ESCOLA_": "EMEF Teste 1", "Data da Visita:": "25/06/2026", "Assinale o período da visita.": "Manhã", "Marque a Regional a qual pertente a unidade escolar.": "Regional Centro", "Nome(s) do(s) responsável(is) pelo acompanhamento pedagógico.": "Prof. Ana Silva", "Endereço de e-mail": "ana@educacao.gov.br", "Carimbo de data/hora": "25/06/2026 10:30", "Observações": "Visita realizada com sucesso" },
      { "_ESCOLA_": "EMEF Teste 2", "Data da Visita:": "24/06/2026", "Assinale o período da visita.": "Tarde", "Marque a Regional a qual pertente a unidade escolar.": "Regional Leste", "Nome(s) do(s) responsável(is) pelo acompanhamento pedagógico.": "Prof. Carlos Santos", "Endereço de e-mail": "carlos@educacao.gov.br", "Carimbo de data/hora": "24/06/2026 14:45", "Observações": "Análise pedagógica concluída" }
    ],
    infantil: [
      { "_ESCOLA_": "EMEI Teste 1", "Data da Visita:": "23/06/2026", "Assinale o período da visita.": "Integral", "Marque a Regional a qual pertente a unidade escolar.": "Regional Sul", "Nome(s) do(s) responsável(is) pelo acompanhamento pedagógico.": "Profa. Maria Costa", "Endereço de e-mail": "maria@educacao.gov.br", "Carimbo de data/hora": "23/06/2026 09:00", "Observações": "Verificação de infraestrutura" }
    ],
    escolasEMEF: ["EMEF Teste 1", "EMEF Teste 2"],
    escolasEMEI: ["EMEI Teste 1"],
    regionalMapEMEF: { "EMEF Teste 1": "Regional Centro", "EMEF Teste 2": "Regional Leste" },
    regionalMapEMEI: { "EMEI Teste 1": "Regional Sul" },
    isAdmin: true,
    emailUsuario: 'teste@educacao.gov.br',
    estaLogado: true
  };
}

function onDados(res) {
  // Isolamento por escola: usuário de escola só vê as visitas da sua unidade.
  try {
    if (res && window.MapaAuth && window.MapaAuth.restritoEscola) {
      const ok = n => window.MapaAuth.podeVerEscola(n);
      if (Array.isArray(res.fundamental)) res.fundamental = res.fundamental.filter(d => ok(d['_ESCOLA_']));
      if (Array.isArray(res.infantil))    res.infantil    = res.infantil.filter(d => ok(d['_ESCOLA_']));
      if (Array.isArray(res.escolasEMEF)) res.escolasEMEF = res.escolasEMEF.filter(ok);
      if (Array.isArray(res.escolasEMEI)) res.escolasEMEI = res.escolasEMEI.filter(ok);
    }
  } catch (e) {}
  if (res && (res.fundamental||res.infantil)) {
    dadosPorSegmento = res;
    escolasOficiais.fundamental = res.escolasEMEF||[];
    escolasOficiais.infantil = res.escolasEMEI||[];
    mapaRegionalOficial.fundamental = res.regionalMapEMEF||{};
    mapaRegionalOficial.infantil = res.regionalMapEMEI||{};
    isAdmin = !!res.isAdmin;
    estaLogado = !!res.estaLogado;
    emailUsuario = res.emailUsuario || '';
  } else {
    dadosPorSegmento.fundamental = Array.isArray(res) ? res : [];
    dadosPorSegmento.infantil = [];
  }
  _atualizarHeaderUsuario();
  // Renderiza os cards imediatamente; as devolutivas carregam em 2º plano
  // (apenas para preencher a contagem do badge) sem bloquear a tela.
  mudarSegmento('fundamental');
  carregarDevolutivas();
}

function onErro(err) {
  document.getElementById('main').innerHTML = `<div class="alert alert-danger shadow-sm fw-bold"><i class="bi bi-exclamation-triangle-fill me-2"></i> Erro: ${err.message||JSON.stringify(err)}</div>`;
}

function mudarSegmento(seg) {
  segmentoAtual = seg;
  todos = dadosPorSegmento[seg]||[];
  selecionados.clear();
  atualizarContadorSel();
  document.getElementById('busca').value = '';
  document.getElementById('filtroRegional').value = '';
  document.getElementById('filtroEscola').value = '';
  if (todos.length === 0) {
    document.getElementById('filtroEscola').innerHTML = '<option value="">Sem dados</option>';
    document.getElementById('badgeCount').style.display = 'none';
    mostrarEstado(`Nenhum registro para Educação ${seg==='fundamental'?'Fundamental':'Infantil'}.`, 'bi-folder-x');
  } else {
    popularFiltros();
    filtrar();
  }
}

function popularFiltros() {
  const regionais = [...new Set(todos.map(d => (d[COL_REGIONAL]||'').toString().trim()).filter(Boolean))].sort();
  const selR = document.getElementById('filtroRegional');
  selR.innerHTML = '<option value="">Todas as Regionais</option>';
  regionais.forEach(r => {
    const o = document.createElement('option');
    o.value = o.textContent = r;
    selR.appendChild(o);
  });
  popularFiltroEscola();
}

function popularFiltroEscola() {
  const regional = document.getElementById('filtroRegional').value;
  const base = regional ? todos.filter(d => (d[COL_REGIONAL]||'').toString().trim() === regional) : todos;
  const escolas = [...new Set(base.map(d => d['_ESCOLA_']||''))].filter(Boolean).sort();
  const sel = document.getElementById('filtroEscola');
  sel.innerHTML = '<option value="">Todas as Escolas</option>';
  escolas.forEach(e => {
    const o = document.createElement('option');
    o.value = o.textContent = e;
    sel.appendChild(o);
  });
}

function filtrar() {
  popularFiltroEscola();
  const regional = document.getElementById('filtroRegional').value;
  const escola = document.getElementById('filtroEscola').value;
  const busca = document.getElementById('busca').value.trim().toLowerCase();
  const badge = document.getElementById('badgeCount');

  filtrados = todos.filter(d => {
    if (regional && (d[COL_REGIONAL]||'').toString().trim() !== regional) return false;
    if (escola && (d['_ESCOLA_']||'') !== escola) return false;
    if (busca && !Object.values(d).some(v => v.toString().toLowerCase().includes(busca))) return false;
    return true;
  });

  selecionados.clear();
  atualizarContadorSel();
  badge.innerHTML = `<i class="bi bi-file-earmark-check-fill text-success me-1"></i> ${filtrados.length} Visita${filtrados.length!==1?'s':''}`;
  badge.style.display = 'inline-block';

  if (filtrados.length === 0) {
    mostrarEstado('Nenhum registro encontrado.', 'bi-search');
    return;
  }
  renderizarCards();
}

function renderizarCards() {
  const main = document.getElementById('main');
  const regional = document.getElementById('filtroRegional').value;
  const escola = document.getElementById('filtroEscola').value;
  const busca = document.getElementById('busca').value.trim().toLowerCase();
  const badges = `<span class="badge bg-white text-dark border shadow-sm px-3 py-2 fw-bold"><i class="bi bi-list-ol me-1 text-primary"></i> ${filtrados.length} listados</span>`;
  const statsBar = `<div class="d-flex flex-wrap gap-2 mb-4 align-items-center">${badges}</div>`;

  // Com filtro específico (regional/escola/busca): lista plana.
  const modoSimples = !!regional || !!escola || !!busca;
  if (modoSimples) {
    const cardsHtml = filtrados.map((item,idx) => _renderCard(item,idx)).join('');
    main.innerHTML = statsBar + `<div class="cards-grid">${cardsHtml}</div>`;
    return;
  }

  // Sem filtro: agrupa por regional em seções recolhíveis.
  const SEM_REGIONAL = '(Sem Regional)';
  const grupos = {};
  filtrados.forEach((item, idx) => {
    const reg = (item[COL_REGIONAL]||'').toString().trim() || SEM_REGIONAL;
    (grupos[reg] = grupos[reg] || []).push({ item, idx });
  });
  const regionais = Object.keys(grupos).sort((a,b) =>
    a===SEM_REGIONAL ? 1 : b===SEM_REGIONAL ? -1 : a.localeCompare(b));
  const umaSo = regionais.length === 1;

  const html = regionais.map(reg => {
    const itens = grupos[reg];
    const nEscolas = new Set(itens.map(({item}) => item['_ESCOLA_']).filter(Boolean)).size;
    const aberta = umaSo;
    const cards = itens.map(({item,idx}) => _renderCard(item,idx)).join('');
    return `
      <div class="regional-group">
        <div class="regional-group-header ${aberta?'':'collapsed'}" onclick="toggleRegional(this)">
          <i class="bi bi-geo-alt-fill" style="color:var(--neon-blue);font-size:1.1rem;flex-shrink:0;"></i>
          <span class="regional-group-nome">${escapar(reg)}</span>
          <span class="regional-group-meta">${nEscolas} escola${nEscolas!==1?'s':''} · ${itens.length} visita${itens.length!==1?'s':''}</span>
          <i class="bi bi-chevron-down regional-group-chevron"></i>
        </div>
        <div class="regional-group-body" style="${aberta?'':'display:none;'}">
          <div class="cards-grid">${cards}</div>
        </div>
      </div>`;
  }).join('');

  main.innerHTML = statsBar + html;
}

function toggleRegional(headerEl) {
  const group = headerEl.closest('.regional-group');
  if (!group) return;
  const body = group.querySelector('.regional-group-body');
  const aberta = !headerEl.classList.contains('collapsed');
  if (aberta) { if (body) body.style.display = 'none'; headerEl.classList.add('collapsed'); }
  else { if (body) body.style.display = 'block'; headerEl.classList.remove('collapsed'); }
}

function _renderCard(item, idx) {
  const dataVisita = item["Data da Visita:"]||item["Data da visita:"]||item["Carimbo de data/hora"]||'Data não informada';
  const responsavel = item["Nome(s) do(s) responsável(is) pelo acompanhamento pedagógico."]||'Não informado';
  const periodo = item["Assinale o período da visita."]||'';
  const nomeEscola = item['_ESCOLA_']||'Escola não informada';
  const reg = (item[COL_REGIONAL]||'').toString().trim();
  const isSel = selecionados.has(idx);
  const dev = _devDoItem(item);
  const temDev = !!dev;
  const dd = (dev && dev._dados) || {};
  const badgesIA = temDev ? `${_badgeMini('bi-flag-fill', dd.prioridade)}${_badgeMini('bi-shield-exclamation', (dd.risco_pedagogico||{}).nivel)}` : '';

  return `
    <div class="card-kpi rel-card ${isSel?'selecionado':''}" id="card-${idx}" onclick="abrirRelatorio(${idx})">
      <div class="card-checkbox-wrap" onclick="event.stopPropagation()">
        <input type="checkbox" class="card-checkbox" ${isSel?'checked':''} onchange="toggleSelecao(event,${idx})" />
      </div>
      <div class="d-flex justify-content-between align-items-start border-bottom pb-2 mb-2 pe-4">
        <div class="card-title-escola">${escapar(nomeEscola)}</div>
        ${reg?`<span class="badge bg-light text-primary border" style="font-size:0.65rem;font-weight:800;">${escapar(reg)}</span>`:''}
      </div>
      <div class="card-meta-info mb-2 d-flex align-items-center gap-2 flex-wrap">
        <span><i class="bi bi-calendar3 me-1"></i> ${escapar(dataVisita)}</span>
        ${periodo?`<span class="badge bg-light text-dark border" style="font-size:0.6rem;font-weight:700;">${escapar(periodo)}</span>`:''}
        ${temDev?`<span class="badge" style="background:var(--neon-pink);color:#fff;font-size:0.6rem;font-weight:800;"><i class="bi bi-robot me-1"></i>Devolutiva IA</span>`:''}
      </div>
      <div style="font-size:0.8rem;color:#495057;line-height:1.4;flex-grow:1;"><b>Resp:</b> ${escapar(responsavel)}</div>
      ${badgesIA?`<div class="d-flex flex-wrap gap-1 mt-2">${badgesIA}</div>`:''}
      <div class="d-flex justify-content-between align-items-end mt-2 pt-2 border-top">
        <span style="font-size:0.75rem;font-weight:800;color:var(--neon-blue);"><i class="bi bi-box-arrow-in-right me-1"></i> Abrir</span>
        ${temDev?`<button class="btn btn-sm py-0 px-2" style="font-size:0.7rem;font-weight:800;color:var(--neon-pink);border:1.5px solid var(--neon-pink);border-radius:6px;" onclick="event.stopPropagation();abrirDevolutivaDoCard(${idx})"><i class="bi bi-robot me-1"></i>Ver devolutiva</button>`:''}
      </div>
    </div>`;
}

function abrirDevolutivaDoCard(idx) {
  const item = filtrados[idx];
  abrirModal(item, _devDoItem(item), 'dev');
}

// Localiza a visita correspondente a uma devolutiva (p/ abrir as duas abas)
function _visitaDaDev(dev) {
  const lista = dadosPorSegmento[dev["Segmento"]] || [];
  const alvo = _chaveDev(dev["Segmento"], dev["Escola"], dev["Data da Visita"]);
  return lista.find(it => _chaveDev(dev["Segmento"], it['_ESCOLA_'], it["Data da Visita:"]||it["Data da visita:"]||'') === alvo);
}

// ── Seleção ──
function toggleSelecao(event, idx) {
  event.stopPropagation();
  if (selecionados.has(idx)) selecionados.delete(idx); else selecionados.add(idx);
  const c = document.getElementById('card-'+idx);
  if (c) c.classList.toggle('selecionado', selecionados.has(idx));
  atualizarContadorSel();
}

function selecionarTodos() {
  filtrados.forEach((_,i) => {
    selecionados.add(i);
    const c = document.getElementById('card-'+i);
    if(c) { c.classList.add('selecionado'); const cb = c.querySelector('.card-checkbox'); if(cb) cb.checked = true; }
  });
  atualizarContadorSel();
}

function limparSelecao() {
  selecionados.clear();
  filtrados.forEach((_,i) => {
    const c = document.getElementById('card-'+i);
    if(c) { c.classList.remove('selecionado'); const cb = c.querySelector('.card-checkbox'); if(cb) cb.checked = false; }
  });
  atualizarContadorSel();
}

function atualizarContadorSel() {
  const n = selecionados.size;
  document.getElementById('contadorSel').textContent = n===0?'0 selecionados':`${n} selecionado${n!==1?'s':''}`;
  document.getElementById('btnAnalisarLote').disabled = n===0;
}

// ── HTML do Relatório da Visita (reutilizável p/ modal e PDF) ──
function _htmlRelatorioVisita(item) {
  const escola = item['_ESCOLA_']||'';
  const dataHoje = new Date().toLocaleDateString('pt-BR');
  const anoAtual = new Date().getFullYear();
  const seg = (item['_SEGMENTO_'] || segmentoAtual);
  const camposSecao = Object.keys(item).filter(k => k!=='_ESCOLA_' && k!=='_SEGMENTO_' && !COLS_FICHA.includes(k));

  const fichaItens = COLS_FICHA.filter(col => item[col]!==undefined).map(col => {
    const val = item[col]||'—';
    return `<div style="display:flex;flex-direction:column;"><span style="font-size:0.7rem;font-weight:800;color:var(--primary);">${escapar(ROTULOS[col]||col)}</span><span style="font-weight:600;">${escapar(val)}</span></div>`;
  }).join('');

  const secoes = camposSecao.map(col => {
    const val = item[col]||'';
    return `<div style="border-left:4px solid #00e5ff;padding-left:12px;margin-bottom:12px;"><div style="font-size:0.75rem;font-weight:800;color:var(--primary);margin-bottom:4px;">${escapar(col)}</div><div>${val?escapar(val):'<span style="color:#adb5bd;font-style:italic;">Não informado</span>'}</div></div>`;
  }).join('');

  return `
    <div style="border-bottom:3px solid var(--primary);padding-bottom:14px;margin-bottom:16px;">
      <div style="font-size:1.1rem;font-weight:800;color:var(--primary);">Acompanhamento Pedagógico</div>
      <div style="font-size:0.75rem;font-weight:700;text-transform:uppercase;color:#6c757d;margin-top:4px;">${seg==='fundamental'?'Ensino Fundamental':'Educação Infantil'} ${anoAtual}</div>
      <div style="font-size:1rem;font-weight:800;margin-top:6px;color:#002b5e;">${escapar(escola)}</div>

}

// ── Modal unificado: Relatório da Visita + Devolutiva (IA) ──
let _pdfHtmlRel = '', _pdfHtmlDev = '';

function abrirModal(item, dev, aba) {
  const temRel = !!item, temDev = !!dev;
  if (!temRel && !temDev) return;
  if (aba === 'dev' && !temDev) aba = 'rel';
  if (aba === 'rel' && !temRel) aba = 'dev';
  if (!aba) aba = temRel ? 'rel' : 'dev';

  const escola = (item && item['_ESCOLA_']) || (dev && dev['Escola']) || '';
  _pdfHtmlRel = temRel ? _htmlRelatorioVisita(item) : '';
  _pdfHtmlDev = temDev ? _htmlDevolutiva(dev) : '';

  const tabs = (temRel && temDev) ? `
    <div class="modal-tabs mb-3">
      <button class="nav-link ${aba==='rel'?'active':''}" type="button" data-aba="rel" onclick="trocarAbaModal('rel')"><i class="bi bi-file-earmark-text-fill me-1"></i>Relatório da Visita</button>
      <button class="nav-link ${aba==='dev'?'active':''}" type="button" data-aba="dev" onclick="trocarAbaModal('dev')"><i class="bi bi-robot me-1"></i>Devolutiva IA</button>
    </div>` : '';

  const paneDevVazio = '<div class="estado"><i class="bi bi-robot"></i><p>Sem devolutiva salva para esta visita.</p></div>';

  document.getElementById('relatorio-container').innerHTML = `
    ${tabs}
    <div id="pane-rel" style="display:${aba==='rel'?'block':'none'};">${_pdfHtmlRel}</div>
    <div id="pane-dev" style="display:${aba==='dev'?'block':'none'};">${temDev ? _pdfHtmlDev : paneDevVazio}</div>`;

  document.getElementById('modalTitulo').textContent = escola;

  const optRel = temRel ? `<label class="pdf-opt"><input type="checkbox" id="pdfRel" checked> Relatório</label>` : '';
  const optDev = temDev ? `<label class="pdf-opt"><input type="checkbox" id="pdfDev" checked> Devolutiva</label>` : '';
  document.getElementById('modalRelatorioFooter').innerHTML = `
    <div class="d-flex align-items-center justify-content-between w-100 flex-wrap gap-2">
      <div class="d-flex align-items-center gap-3 flex-wrap">
        <span style="font-size:.72rem;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:.04em;"><i class="bi bi-filetype-pdf me-1"></i>Incluir no PDF:</span>
        ${optRel}${optDev}
      </div>
      <button class="btn btn-action btn-action-primary" onclick="gerarPdf()"><i class="bi bi-printer-fill me-1"></i>Imprimir / PDF</button>
    </div>`;

  bootstrap.Modal.getOrCreateInstance(document.getElementById('modalRelatorio')).show();
}

function trocarAbaModal(aba) {
  const r = document.getElementById('pane-rel'), d = document.getElementById('pane-dev');
  if (r) r.style.display = aba==='rel' ? 'block' : 'none';
  if (d) d.style.display = aba==='dev' ? 'block' : 'none';
  document.querySelectorAll('.modal-tabs .nav-link').forEach(b => b.classList.toggle('active', b.dataset.aba === aba));
}

function _pdfCabecalho(subtitulo) {
  const dataHoje = new Date().toLocaleDateString('pt-BR');
  return `<div class="pdf-cab">
    <div class="pdf-cab-marca"><i class="bi bi-map-fill"></i>MAPA <span>· SME RIBEIRÃO PRETO</span></div>
    <div class="pdf-cab-sub">${subtitulo}</div>
    <div class="pdf-cab-data">Gerado em ${dataHoje}</div>
  </div>`;
}

function _pdfRodape() {
  return `<div class="pdf-rodape">
    <span>MAPA · Secretaria Municipal da Educação de Ribeirão Preto</span>
    <span>Acompanhamento Pedagógico</span>
  </div>`;
}

function gerarPdf() {
  const incRel = !!document.getElementById('pdfRel') && document.getElementById('pdfRel').checked;
  const incDev = !!document.getElementById('pdfDev') && document.getElementById('pdfDev').checked;
  if (!incRel && !incDev) { mostrarToast('Selecione ao menos uma seção para o PDF.'); return; }
  let html = '';
  if (incRel && _pdfHtmlRel) html += `<section class="pdf-sec">${_pdfCabecalho('Relatório de Acompanhamento Pedagógico')}${_pdfHtmlRel}${_pdfRodape()}</section>`;
  if (incDev && _pdfHtmlDev) html += `<section class="pdf-sec">${_pdfCabecalho('Devolutiva Pedagógica (IA)')}${_pdfHtmlDev}${_pdfRodape()}</section>`;
  document.getElementById('print-area').innerHTML = html;

// ── Autenticação ──
function entrarComGoogle() {
  const btn = document.getElementById('btnEntrar');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Verificando...'; }

  // Detecta modo (Apps Script ou API externa)
  if (typeof google !== 'undefined' && google.script) {
    // Modo Apps Script
    google.script.run
      .withSuccessHandler(function(res) {
        processarAutenticacao(res, btn);
      })
      .withFailureHandler(function(err) {
        mostrarToast('Erro: ' + (err.message||''));
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-google me-1"></i> Entrar'; }
      })
      .autenticarUsuario();
  } else {
    // Modo API externa
    chamarAPI('autenticar')
      .then(res => processarAutenticacao(res, btn))
      .catch(err => {
        mostrarToast('Erro ao autenticar: ' + (err.message||''));
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-google me-1"></i> Entrar'; }
      });
  }
}

function processarAutenticacao(res, btn) {
  if (res.ok) {
    isAdmin = !!res.isAdmin;
    estaLogado = !!res.estaLogado;
    emailUsuario = res.email || '';
    _atualizarHeaderUsuario();
    mostrarToast(isAdmin ? 'Admin ativado!' : (estaLogado ? 'Logado!' : 'Erro ao identificar'));
  }
  if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-google me-1"></i> Entrar'; }
}

function _atualizarHeaderUsuario() {
  const indicator = document.getElementById('user-indicator');
  const btnEntrar = document.getElementById('btnEntrar');
  const emailDisplay = document.getElementById('user-email-display');
  const adminBadge = document.getElementById('user-admin-badge');

  if (estaLogado && emailUsuario) {
    if (indicator) { indicator.style.display = 'flex'; }
    if (btnEntrar) { btnEntrar.style.display = 'none'; }
    if (emailDisplay) { emailDisplay.textContent = emailUsuario; }
    if (adminBadge) { adminBadge.style.display = isAdmin ? 'inline-block' : 'none'; }
  } else {
    if (indicator) { indicator.style.display = 'none'; }
    if (btnEntrar) { btnEntrar.style.display = ''; }
  }
}

// ── Devolutivas ──
function carregarDevolutivas(cb, forcar) {
  // Já em memória: renderiza na hora, sem nova requisição à API.
  if (devolutivasCarregadas && !forcar) {
    if (secaoAtual === 'devolutivas') { popularFiltrosDevolutivas(); filtrarDevolutivas(); }
    if (cb) cb();
    return;
  }

  // Só mostra o spinner quando a aba Devolutivas está ativa; em carga inicial
  // esta função roda em segundo plano e não deve sobrescrever o main.
  if (secaoAtual === 'devolutivas') {
    const main = document.getElementById('main');
    main.innerHTML = '<div class="spinner-wrapper"><div class="spinner-border text-primary" role="status"></div></div>';
  }

  const onSucesso = res => {
    if (!res || !res.ok) {
      if (secaoAtual === 'devolutivas') {
        document.getElementById('main').innerHTML = `<div class="alert alert-danger fw-bold">Erro: ${escapar((res && res.erro) || 'falha ao carregar devolutivas')}</div>`;
      }
      if (cb) cb();
      return;
    }
    todasDevolutivas = res.registros || [];
    devolutivasCarregadas = true;
    _construirMapaDevolutivas();
    const n = todasDevolutivas.length;
    const b = document.getElementById('badge-dev');
    if (b) { b.textContent = n; b.style.display = n > 0 ? 'inline-flex' : 'none'; }
    if (secaoAtual === 'devolutivas') {
      popularFiltrosDevolutivas();
      filtrarDevolutivas();
    } else if (filtrados.length) {
      // Atualiza os cards de visita para exibir os selos de devolutiva
      renderizarCards();
    }
    if (cb) cb();
  };

  if (typeof google !== 'undefined' && google.script) {
    // Modo Google Apps Script
    google.script.run.withSuccessHandler(onSucesso).lerDevolutivas();
  } else {
    // Modo externo: API ou fallback silencioso (sem devolutivas)
    chamarAPI('lerDevolutivas')
      .then(onSucesso)
      .catch(() => onSucesso({ ok: true, registros: [] }));
  }
}

// Resolve a regional de uma devolutiva (campo direto ou via mapa oficial da escola)
function _regionalDaDev(dev) {
  if (dev["Regional"] && dev["Regional"] !== 'REDE') return dev["Regional"];
  const escola = dev["Escola"] || '';
  const segDev = (dev["Segmento"] || '').toLowerCase();
  const segKey = segDev.includes('fundamental') ? 'fundamental' : segDev.includes('infantil') ? 'infantil' : null;
  if (segKey) { const r = (mapaRegionalOficial[segKey] || {})[escola] || ''; if (r) return r; }
  for (const s of ['fundamental', 'infantil']) { const r = (mapaRegionalOficial[s] || {})[escola] || ''; if (r) return r; }
  return '';
}

// Rótulo amigável do segmento
function _rotuloSegmento(s) {
  const v = (s || '').toLowerCase();
  if (v.includes('fundamental')) return 'Fundamental';
  if (v.includes('infantil')) return 'Infantil';
  return s || '';
}

// Badge compacto colorido por nível (prioridade/risco) para os cards
function _badgeMini(icone, valor) {
  if (!valor) return '';
  const v = valor.toLowerCase();
  let bg = '#e2e8f0', fg = '#475569';
  if (/alt|crít|crit/.test(v))      { bg = '#fee2e2'; fg = '#b91c1c'; }
  else if (/m[éeè]d/.test(v))       { bg = '#fef3c7'; fg = '#92400e'; }
  else if (/baix/.test(v))          { bg = '#d1fae5'; fg = '#047857'; }
  return `<span style="background:${bg};color:${fg};font-weight:800;font-size:.62rem;padding:2px 8px;border-radius:999px;"><i class="bi ${icone} me-1"></i>${escapar(valor)}</span>`;
}

function popularFiltrosDevolutivas() {
  // Segmento
  const selSeg = document.getElementById('filtroDevSegmento');
  const segAtual = selSeg.value;
  const segmentos = [...new Set(todasDevolutivas.map(d => d["Segmento"]).filter(Boolean))].sort();
  selSeg.innerHTML = '<option value="">Todos os Segmentos</option>' +
    segmentos.map(s => `<option value="${escapar(s)}">${escapar(_rotuloSegmento(s))}</option>`).join('');
  selSeg.value = segmentos.includes(segAtual) ? segAtual : '';

  // Regional (resolvida pela escola)
  const selReg = document.getElementById('filtroDevRegional');
  const regAtual = selReg.value;
  const regionaisSet = new Set();
  todasDevolutivas.forEach(d => { const r = _regionalDaDev(d); if (r) regionaisSet.add(r); });
  const regionais = [...regionaisSet].sort();
  selReg.innerHTML = '<option value="">Todas as Regionais</option>' +
    regionais.map(r => `<option value="${escapar(r)}">${escapar(r)}</option>`).join('');
  selReg.value = regionais.includes(regAtual) ? regAtual : '';
}

function filtrarDevolutivas() {
  const seg    = document.getElementById('filtroDevSegmento').value;
  const regFil = document.getElementById('filtroDevRegional').value;
  const prio   = document.getElementById('filtroDevPrioridade').value;
  const busca  = document.getElementById('buscaDev').value.trim().toLowerCase();

  devolutivasFiltradas = todasDevolutivas.filter(d => {
    if (seg    && d["Segmento"] !== seg) return false;
    if (regFil && _regionalDaDev(d) !== regFil) return false;
    if (prio   && ((d._dados||{}).prioridade||'').toLowerCase() !== prio.toLowerCase()) return false;
    if (busca) {
      const alvo = [d["Escola"], d["Data da Visita"], _regionalDaDev(d), _rotuloSegmento(d["Segmento"])].join(' ').toLowerCase();
      if (!alvo.includes(busca)) return false;
    }
    return true;
  });

  renderizarDevolutivas();
}

function renderizarDevolutivas() {
  const main = document.getElementById('main');
  if (devolutivasFiltradas.length === 0) { mostrarEstado('Nenhuma devolutiva encontrada.', 'bi-robot'); return; }

  const n = devolutivasFiltradas.length;
  const stats = `<div class="d-flex flex-wrap gap-2 mb-4 align-items-center">
    <span class="badge bg-white text-dark border shadow-sm px-3 py-2 fw-bold"><i class="bi bi-robot me-1 text-primary"></i> ${n} devolutiva${n!==1?'s':''}</span>
  </div>`;

  const cardsHtml = devolutivasFiltradas.map((dev,i) => renderCardDevolutiva(dev,i)).join('');
  main.innerHTML = stats + `<div class="cards-grid">${cardsHtml}</div>`;
}

  const sintese = d.sintese_executiva || (d.pontos_fortes && d.pontos_fortes[0]) || '';

  return `
    <div class="card-kpi rel-card" onclick="abrirDevolutivaIdx(${i})">

      </div>
      <div class="card-meta-info mb-2 d-flex flex-wrap gap-2 align-items-center">
        <span><i class="bi bi-calendar3 me-1"></i>${escapar(dev["Data da Visita"]||'—')}</span>
        ${reg?`<span class="badge bg-light text-primary border" style="font-size:0.6rem;font-weight:800;"><i class="bi bi-geo-alt me-1"></i>${escapar(reg)}</span>`:''}
      </div>
      ${sintese?`<div style="font-size:0.78rem;color:#495057;line-height:1.4;flex-grow:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;">${escapar(sintese)}</div>`:'<div style="flex-grow:1;"></div>'}
      ${(d.prioridade||risco.nivel)?`<div class="d-flex flex-wrap gap-1 mt-2">${_badgeMini('bi-flag-fill',d.prioridade)}${_badgeMini('bi-shield-exclamation',risco.nivel)}</div>`:''}
      <div class="d-flex justify-content-between align-items-center mt-2 pt-2 border-top">

      </div>
    </div>`;
}

// Abertura a partir dos cards da aba Devolutivas (por índice da lista filtrada)
function abrirDevolutivaIdx(i) {
  const dev = devolutivasFiltradas[i];
  if (dev) abrirModal(_visitaDaDev(dev), dev, 'dev');
}

// Exclusão (apenas admin; backend roda como dono do script)
function excluirDevolutiva(event, id) {
  event.stopPropagation();
  if (!id) return;
  if (!confirm('Excluir esta devolutiva permanentemente?')) return;
  const onOk = res => {
    if (res && res.ok) {
      mostrarToast('Devolutiva excluída.');
      devolutivasCarregadas = false;
      carregarDevolutivas(null, true);
    } else {
      mostrarToast('Erro ao excluir: ' + ((res && res.erro) || ''));
    }
  };
  if (typeof google !== 'undefined' && google.script) {
    google.script.run.withSuccessHandler(onOk).withFailureHandler(() => mostrarToast('Falha ao excluir.')).excluirDevolutiva(id);
  } else {
    chamarAPI('excluirDevolutiva', { id }).then(onOk).catch(() => mostrarToast('Falha ao excluir.'));
  }
}

// ════════════════════════════════════════════════
//  Estatísticas / Cobertura de Visitas
// ════════════════════════════════════════════════
let chartCobertura = null;
let _coberturaCompleta = [];
let filtroAtivo = null; // null | {tipo:'freq', valor:N} | {tipo:'dev'}
let _estFreqs = [];
let ordemCob = { campo: 'escola', asc: true };

const PALETA_FREQ = ['#002b5e','#39c46e','#FFD300','#FF007F','#00b4d8','#6f42c1','#fd7e14'];
function _corFreq(f) { return f === 0 ? '#dc3545' : PALETA_FREQ[(f-1) % PALETA_FREQ.length]; }
function _rotuloFreq(f) { return f === 0 ? 'Sem visita' : f + (f === 1 ? ' visita' : ' visitas'); }
function _rotuloFiltro() {
  if (!filtroAtivo) return '';
  if (filtroAtivo.tipo === 'dev') return 'Com devolutiva';
  return _rotuloFreq(filtroAtivo.valor);
}

function _parseData(str) {
  if (!str) return null;
  const m = String(str).match(/(\d{2})\/(\d{2})\/(\d{4})(?:\s+(\d{2}):(\d{2}))?/);
  if (!m) return null;
  return new Date(+m[3], +m[2]-1, +m[1], +(m[4]||0), +(m[5]||0));
}
function _fmtData(d) {
  if (!d) return '—';
  return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear();
}

// Monta a cobertura (1 linha por escola oficial) dos segmentos selecionados
function _construirCobertura(segs) {
  const linhas = [];
  segs.forEach(seg => {
    const oficiais = escolasOficiais[seg] || [];
    const mapaReg  = mapaRegionalOficial[seg] || {};
    const visitas  = dadosPorSegmento[seg] || [];
    const porEscola = {};
    visitas.forEach(v => {
      const e = (v['_ESCOLA_']||'').toString().trim();
      if (!e) return;
      (porEscola[e] = porEscola[e] || []).push(v);
    });
    const universo = oficiais.length ? oficiais : Object.keys(porEscola);
    universo.forEach(escola => {
      const vs = porEscola[escola] || [];
      const datas = vs.map(v => _parseData(v['Data da Visita:']||v['Data da visita:']||v['Carimbo de data/hora'])).filter(Boolean);
      const ultima = datas.length ? new Date(Math.max(...datas.map(d=>d.getTime()))) : null;
      const reg = mapaReg[escola] || (vs[0] && (vs[0][COL_REGIONAL]||'').toString().trim()) || '—';
      const temDev = vs.some(v => mapaDevolutivas.has(_chaveDev(seg, escola, v['Data da Visita:']||v['Data da visita:']||'')));
      linhas.push({
        escola, regional: reg, segmento: seg==='fundamental'?'Fundamental':'Infantil',
        nVisitas: vs.length, ultima, temDev
      });
    });
  });
  return linhas;
}

function renderEstatisticas() {
  const main = document.getElementById('main');
  if (!escolasOficiais.fundamental.length && !escolasOficiais.infantil.length
      && !(dadosPorSegmento.fundamental||[]).length && !(dadosPorSegmento.infantil||[]).length) {
    mostrarEstado('Sem dados para estatísticas.', 'bi-bar-chart');
    return;
  }
  const segSel = document.getElementById('filtroEstSegmento').value;
  const segs = segSel === 'todos' ? ['fundamental','infantil'] : [segSel];

  const completa = _construirCobertura(segs);

  // Popula filtro de regionais preservando a seleção
  const selReg = document.getElementById('filtroEstRegional');
  const regAtual = selReg.value;
  const regionais = [...new Set(completa.map(l => l.regional).filter(r => r && r !== '—'))].sort();
  selReg.innerHTML = '<option value="">Todas as Regionais</option>' +
    regionais.map(r => `<option value="${escapar(r)}">${escapar(r)}</option>`).join('');
  selReg.value = regionais.includes(regAtual) ? regAtual : '';

  const regFil = selReg.value;
  const busca = document.getElementById('buscaEst').value.trim().toLowerCase();
  _coberturaCompleta = completa.filter(l =>
    (!regFil || l.regional === regFil) && (!busca || l.escola.toLowerCase().includes(busca)));

  // Métricas agregadas (sempre sobre o conjunto filtrado, independente do KPI ativo)
  const total = _coberturaCompleta.length;
  const visitadas = _coberturaCompleta.filter(l => l.nVisitas > 0).length;
  const totalVisitas = _coberturaCompleta.reduce((s,l) => s + l.nVisitas, 0);
  const comDev = _coberturaCompleta.filter(l => l.temDev).length;
  const cobertura = total ? Math.round(visitadas/total*100) : 0;

  // Contagem por frequência de visitas (1 KPI por quantidade)
  const contagem = {};
  _coberturaCompleta.forEach(l => { contagem[l.nVisitas] = (contagem[l.nVisitas]||0) + 1; });
  const freqs = Object.keys(contagem).map(Number).sort((a,b) => a-b);

  const ativoFreq = f => (filtroAtivo && filtroAtivo.tipo==='freq' && filtroAtivo.valor===f) ? 'ativo' : '';
  const ativoDev  = (filtroAtivo && filtroAtivo.tipo==='dev') ? 'ativo' : '';

  // KPI "Escolas" (limpa o filtro) + 1 KPI por frequência + Cobertura + Total + Com devolutiva
  const kpiEscolas = `<div class="est-kpi info clic ${filtroAtivo?'':'ativo'}" onclick="filtrarKpi(null)"><div class="lbl">Escolas</div><div class="val">${total}</div></div>`;
  const kpisFreq = freqs.map(f => {
    const cor = _corFreq(f);
    return `<div class="est-kpi clic ${ativoFreq(f)}" style="border-left-color:${cor};" onclick="filtrarKpi('freq',${f})"><div class="lbl">${_rotuloFreq(f)}</div><div class="val" style="color:${cor};">${contagem[f]}</div></div>`;
  }).join('');
  const kpiCobertura = `<div class="est-kpi"><div class="lbl">Cobertura</div><div class="val">${cobertura}%</div></div>`;
  const kpiTotalVis  = `<div class="est-kpi"><div class="lbl">Total de visitas</div><div class="val">${totalVisitas}</div></div>`;
  const kpiDev       = `<div class="est-kpi dev clic ${ativoDev}" onclick="filtrarKpi('dev')"><div class="lbl">Com devolutiva</div><div class="val">${comDev}</div></div>`;

  const kpis = `<div class="est-kpis-grid mb-3">${kpiEscolas}${kpisFreq}${kpiCobertura}${kpiTotalVis}${kpiDev}</div>`;

  main.innerHTML = `
    ${kpis}
    <div class="table-container" id="cob-tabela"></div>`;

  _desenharDonut(_coberturaCompleta);
  _refreshTabelaCob();
}

// Mudança nos filtros da lateral (segmento/regional/busca) zera o KPI ativo
function mudarFiltroEst() { filtroAtivo = null; renderEstatisticas(); }

// Aplica filtro a partir de um KPI / fatia do donut (alterna se já ativo)
function filtrarKpi(tipo, valor) {
  if (tipo === null) filtroAtivo = null;
  else if (tipo === 'freq') filtroAtivo = (filtroAtivo && filtroAtivo.tipo==='freq' && filtroAtivo.valor===valor) ? null : { tipo:'freq', valor };
  else if (tipo === 'dev')  filtroAtivo = (filtroAtivo && filtroAtivo.tipo==='dev') ? null : { tipo:'dev' };
  renderEstatisticas();
}

// Distribuição de escolas por nº de visitas (donut clicável)
function _desenharDonut(lista) {
  const contagem = {};
  lista.forEach(l => { contagem[l.nVisitas] = (contagem[l.nVisitas]||0) + 1; });
  _estFreqs = Object.keys(contagem).map(Number).sort((a,b) => a-b);
  const labels = _estFreqs.map(f => _rotuloFreq(f));
  const data   = _estFreqs.map(f => contagem[f]);
  const bg     = _estFreqs.map(f => _corFreq(f));
  const totalN = data.reduce((s,n) => s+n, 0);

  if (chartCobertura) { chartCobertura.destroy(); chartCobertura = null; }
  const ctx = document.getElementById('canvasCobertura');
  if (!ctx || typeof Chart === 'undefined') return;

  const temDL = typeof ChartDataLabels !== 'undefined';
  const cfg = {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: bg, borderWidth: 2, borderColor: '#fff' }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '62%',
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 10, font: { family: 'Inter', weight: 'bold', size: 11 } } },
        datalabels: temDL ? {
          color: c => { const hex = c.dataset.backgroundColor[c.dataIndex]; return ['#39c46e','#FFD300','#00b4d8'].includes(hex) ? '#002b5e' : '#fff'; },
          font: { family: 'Inter', weight: 'bold', size: 13 },
          formatter: v => { const p = Math.round(v/totalN*100); return p >= 5 ? p+'%' : ''; }
        } : undefined
      },
      onClick: (evt, els) => { if (els.length) filtrarKpi('freq', _estFreqs[els[0].index]); else filtrarKpi(null); }
    }
  };
  if (temDL) cfg.plugins = [ChartDataLabels];
  chartCobertura = new Chart(ctx, cfg);
}

// Lista exibida na tabela = conjunto filtrado, opcionalmente recortado pela fatia do donut, ordenado
function _listaTabela() {
  let lista = _coberturaCompleta.slice();
  if (filtroAtivo) {
    if (filtroAtivo.tipo === 'freq') lista = lista.filter(l => l.nVisitas === filtroAtivo.valor);
    else if (filtroAtivo.tipo === 'dev') lista = lista.filter(l => l.temDev);
  }
  _ordenarLista(lista);
  return lista;
}

function _htmlTabelaCob(lista) {
  const seta = c => ordemCob.campo===c ? (ordemCob.asc?' ▲':' ▼') : '';
  const filtroBadge = filtroAtivo
    ? `<span class="badge" style="background:var(--neon-blue);color:var(--primary);font-weight:800;">Filtro: ${escapar(_rotuloFiltro())} <i class="bi bi-x-circle-fill ms-1" style="cursor:pointer;" onclick="verTodasFreq()"></i></span>`
    : '';
  const linhasHtml = lista.map(l => `
    <tr>
      <td style="font-weight:700;color:#1e293b;">${escapar(l.escola)}</td>
      <td>${escapar(l.regional)}</td>
      <td>${escapar(l.segmento)}</td>
      <td class="text-center">${l.nVisitas}</td>
      <td>${_fmtData(l.ultima)}</td>
      <td>${l.nVisitas>0?'<span class="pill pill-ok">Visitada</span>':'<span class="pill pill-no">Sem visita</span>'}</td>
      <td>${l.temDev?'<span class="pill pill-dev"><i class="bi bi-robot me-1"></i>Sim</span>':'<span class="text-muted">—</span>'}</td>
    </tr>`).join('');
  return `
    <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-2">
      <div style="font-weight:900;color:var(--primary);font-size:.95rem;"><i class="bi bi-table me-1"></i>Cobertura por Unidade Escolar</div>
      <div class="d-flex gap-2 align-items-center">${filtroBadge}<span class="badge bg-light text-dark border fw-bold">${lista.length} escola${lista.length!==1?'s':''}</span></div>
    </div>
    <div style="max-height:68vh;overflow:auto;">
      <table class="tbl-cob">
        <thead><tr>
          <th onclick="ordenarCobertura('escola')">Unidade Escolar${seta('escola')}</th>
          <th onclick="ordenarCobertura('regional')">Regional${seta('regional')}</th>
          <th onclick="ordenarCobertura('segmento')">Segmento${seta('segmento')}</th>
          <th onclick="ordenarCobertura('nVisitas')" class="text-center">Nº visitas${seta('nVisitas')}</th>
          <th onclick="ordenarCobertura('ultima')">Última visita${seta('ultima')}</th>
          <th onclick="ordenarCobertura('status')">Status${seta('status')}</th>
          <th onclick="ordenarCobertura('temDev')">Devolutiva${seta('temDev')}</th>
        </tr></thead>
        <tbody>${linhasHtml || '<tr><td colspan="7" class="text-center text-muted py-4">Nenhuma escola encontrada.</td></tr>'}</tbody>
      </table>
    </div>`;
}

function _refreshTabelaCob() {
  const cont = document.getElementById('cob-tabela');
  if (cont) cont.innerHTML = _htmlTabelaCob(_listaTabela());
}

function verTodasFreq() { filtrarKpi(null); }

function ordenarCobertura(campo) {
  if (ordemCob.campo === campo) ordemCob.asc = !ordemCob.asc;
  else { ordemCob.campo = campo; ordemCob.asc = true; }
  _refreshTabelaCob();
}

function _ordenarLista(lista) {
  const c = ordemCob.campo, mult = ordemCob.asc ? 1 : -1;
  lista.sort((a,b) => {
    let va, vb;
    if (c === 'status')      { va = a.nVisitas>0?1:0; vb = b.nVisitas>0?1:0; }
    else if (c === 'temDev') { va = a.temDev?1:0;     vb = b.temDev?1:0; }
    else if (c === 'ultima') { va = a.ultima?a.ultima.getTime():0; vb = b.ultima?b.ultima.getTime():0; }
    else { va = a[c]; vb = b[c]; }
    if (typeof va === 'string') return va.localeCompare(vb) * mult;
    return (va - vb) * mult;
  });
}

function exportarCoberturaCSV() {
  const lista = _listaTabela();
  if (!lista.length) { mostrarToast('Nada para exportar.'); return; }
  const cab = ['Unidade Escolar','Regional','Segmento','Nº de visitas','Última visita','Status','Devolutiva'];
  const linhas = lista.map(l => [
    l.escola, l.regional, l.segmento, l.nVisitas, _fmtData(l.ultima),
    l.nVisitas>0?'Visitada':'Sem visita', l.temDev?'Sim':'Não'
  ]);
  const csv = [cab, ...linhas].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(';')).join('\r\n');
  const blob = new Blob(['﻿'+csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'cobertura_visitas.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  mostrarToast('CSV exportado!');
}

(function(){ var done=false; function go(){ if(done)return; done=true; carregarDados(); }
  if(window.MapaAuth && window.MapaAuth.perfil) return go();
  document.addEventListener('mapa-auth-pronto', go, {once:true});
  setTimeout(go, 8000);
})();
</script>
