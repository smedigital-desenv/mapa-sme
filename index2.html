<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MAPA — SME Ribeirão Preto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">

  <!-- Atribuição priorizada: pré-renderiza em segundo plano (carrega dados antes do clique) -->
  <script type="speculationrules">
  {
    "prerender": [
      { "source": "list", "urls": ["atribuicao2.html"], "eagerness": "immediate" }
    ]
  }
  </script>

  <!-- Demais módulos: prefetch (baixa em tempo ocioso, mais leve) -->
  <link rel="prefetch" href="avaliacao.html">
  <link rel="prefetch" href="elefante2.html">
  <link rel="prefetch" href="fluencia2.html">
  <style>
    :root { --primary:#002b5e; --neon-blue:#00e5ff; }
    body { background:#f0f4f8; font-family:'Inter',sans-serif; padding-bottom:50px; }

    /* ── Cabeçalho global (igual aos módulos) ── */
    .mg-header {
      background:var(--primary); color:#fff; border-bottom:5px solid var(--neon-blue);
      padding:.95rem 1.6rem; display:flex; align-items:center; justify-content:space-between;
      gap:1rem; flex-wrap:wrap; position:sticky; top:0; z-index:1050;
      box-shadow:0 6px 18px rgba(0,43,94,.18);
    }
    .mg-brand { display:flex; align-items:center; gap:.6rem; min-width:180px; }
    .mg-brand-icon { width:34px; height:34px; display:grid; place-items:center; color:var(--neon-blue); font-size:1.4rem; filter:drop-shadow(0 0 6px rgba(0,229,255,.55)); }
    .mg-brand h4 { margin:0; font-weight:900; letter-spacing:.03em; font-size:1.4rem; line-height:1; }
    .mg-brand-sub { font-size:.63rem; color:rgba(255,255,255,.68); font-weight:800; letter-spacing:.08em; text-transform:uppercase; margin-top:2px; }
    .mg-nav { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; flex:1; min-width:280px; }
    .mg-nav-btn { display:inline-flex; align-items:center; gap:.4rem; justify-content:center; min-width:150px;
      font-size:.78rem; font-weight:900; padding:6px 14px; border-radius:8px; border:2px solid transparent;
      color:#fff; text-decoration:none; transition:.2s; white-space:nowrap; }
    .mg-nav-btn:hover { border-color:rgba(255,255,255,.4); }
    .mg-nav-btn.active { background:#fff; color:var(--primary); box-shadow:0 2px 10px rgba(0,0,0,.18); }
    .mg-spacer { min-width:86px; }
    @media (max-width:992px){ .mg-nav-btn{ min-width:auto; } .mg-spacer{ display:none; } }

    /* ── Cards de módulos ── */
    .mod-card {
      display:flex; align-items:center; gap:1rem; text-decoration:none;
      background:#fff; border-radius:16px; padding:1.1rem 1.25rem;
      box-shadow:0 4px 15px rgba(0,0,0,.05); border:1.5px solid transparent;
      transition:transform .15s, box-shadow .15s, border-color .15s; height:100%;
    }
    .mod-card:hover { transform:translateY(-3px); box-shadow:0 10px 26px rgba(0,43,94,.14); border-color:#bcdcff; }
    .mod-card .ic { width:52px; height:52px; flex-shrink:0; border-radius:13px; display:grid; place-items:center; font-size:1.5rem; color:#fff; }
    .mod-card .tt { font-weight:900; color:var(--primary); font-size:1.02rem; }
    .mod-card .ds { font-size:.78rem; color:#64748b; }
    .mod-card .go { margin-left:auto; color:#94a3b8; font-size:1.1rem; }

    /* ── Mural de novidades ── */
    .news-card { background:#fff; border-radius:16px; box-shadow:0 4px 15px rgba(0,0,0,.05); overflow:hidden; }
    .news-item { padding:.85rem 1.1rem; border-bottom:1px solid #eef2f7; }
    .news-item:last-child { border-bottom:0; }
    .news-tag { display:inline-block; font-size:.62rem; font-weight:800; text-transform:uppercase; letter-spacing:.05em;
      padding:2px 8px; border-radius:999px; }
    .news-date { font-size:.68rem; color:#94a3b8; font-weight:700; }
    .news-title { font-weight:800; color:#0f172a; font-size:.9rem; margin-top:3px; }
    .news-text { font-size:.82rem; color:#475569; }
    .secao-titulo { font-weight:900; color:var(--primary); letter-spacing:.02em; }
  </style>
</head>
<body>

  <!-- ── Cabeçalho global ── -->
  <header class="mg-header">
    <div class="mg-brand">
      <div class="mg-brand-icon"><i class="bi bi-map-fill"></i></div>
      <div>
        <h4>MAPA</h4>
        <div class="mg-brand-sub">SME Ribeirão Preto</div>
      </div>
    </div>
    <nav class="mg-nav">
      <a class="mg-nav-btn active" href="index2.html"><i class="bi bi-house-fill"></i>Início</a>
      <a class="mg-nav-btn" href="avaliacao.html"><i class="bi bi-clipboard-data-fill"></i>Avaliações</a>
      <a class="mg-nav-btn" href="atribuicao2.html"><i class="bi bi-diagram-3-fill"></i>Atribuição</a>
      <a class="mg-nav-btn" href="elefante2.html"><i class="bi bi-book-fill"></i>Elefante Letrado</a>
      <a class="mg-nav-btn" href="fluencia2.html"><i class="bi bi-book-half"></i>Fluência Leitora</a>
    </nav>
    <div class="mg-spacer"></div>
  </header>

  <main class="container py-4" style="max-width:1100px;">

    <h5 class="secao-titulo mb-3"><i class="bi bi-grid-1x2-fill me-2"></i>Módulos</h5>
    <div class="row g-3 mb-4">
      <div class="col-12 col-md-6 col-lg-3">
        <a class="mod-card" href="avaliacao.html">
          <div class="ic" style="background:#0284c7;"><i class="bi bi-clipboard-data-fill"></i></div>
          <div><div class="tt">Avaliações</div><div class="ds">Rede · Diagnóstica · Bimestres</div></div>
          <i class="bi bi-chevron-right go"></i>
        </a>
      </div>
      <div class="col-12 col-md-6 col-lg-3">
        <a class="mod-card" href="atribuicao2.html">
          <div class="ic" style="background:#059669;"><i class="bi bi-diagram-3-fill"></i></div>
          <div><div class="tt">Atribuição</div><div class="ds">PPA · PRA · Disciplinas</div></div>
          <i class="bi bi-chevron-right go"></i>
        </a>
      </div>
      <div class="col-12 col-md-6 col-lg-3">
        <a class="mod-card" href="elefante2.html">
          <div class="ic" style="background:#7c3aed;"><i class="bi bi-book-fill"></i></div>
          <div><div class="tt">Elefante Letrado</div><div class="ds">Engajamento e leitura</div></div>
          <i class="bi bi-chevron-right go"></i>
        </a>
      </div>
      <div class="col-12 col-md-6 col-lg-3">
        <a class="mod-card" href="fluencia2.html">
          <div class="ic" style="background:#d97706;"><i class="bi bi-book-half"></i></div>
          <div><div class="tt">Fluência Leitora</div><div class="ds">Avaliação diagnóstica de fluência</div></div>
          <i class="bi bi-chevron-right go"></i>
        </a>
      </div>
    </div>

    <h5 class="secao-titulo mb-3"><i class="bi bi-megaphone-fill me-2"></i>Novidades e atualizações</h5>
    <div class="news-card" id="muralNoticias"></div>

  </main>

  <script>
    /* ════════════════════════════════════════════════════════════
       NOVIDADES — edite a lista abaixo para publicar atualizações.
       (Depois podemos puxar isto de uma tabela 'noticias' no Supabase.)
       cor: 'azul' | 'verde' | 'roxo' | 'laranja' | 'cinza'
       ════════════════════════════════════════════════════════════ */
    const NOTICIAS = [
      { data:'20/06/2026', tag:'Plataforma', cor:'azul',
        titulo:'Novo painel unificado dos módulos',
        texto:'Avaliações, Atribuição, Elefante Letrado e Fluência agora ficam nesta tela inicial, com navegação mais rápida e cache que evita recarregar tudo a cada acesso.' },
      { data:'20/06/2026', tag:'Atribuição', cor:'verde',
        titulo:'Aba "Não Atribuídas" e filtros novos',
        texto:'Lista de todas as aulas sem professor (por escola ou por disciplina), filtros por ano/série, tipo de escola e status (Tudo / Atribuídas / Não atribuídas), além de exportação para Excel.' },
      { data:'20/06/2026', tag:'Atribuição', cor:'verde',
        titulo:'Relatório de Saldo PPA',
        texto:'KPIs corrigidos do PPA, agrupamento de turnos por escola e o relatório de saldo com cópia e download em Excel.' },
      { data:'20/06/2026', tag:'Fluência · Elefante', cor:'laranja',
        titulo:'Cache de dados',
        texto:'Revisitar um módulo na mesma sessão carrega na hora; o botão "Atualizar" traz dados frescos.' },
    ];

    const CORES = {
      azul:   ['#0369a1','#e0f2fe'], verde:['#047857','#d1fae5'],
      roxo:   ['#6d28d9','#ede9fe'], laranja:['#b45309','#fef3c7'],
      cinza:  ['#475569','#f1f5f9'],
    };
    function esc(s){ return String(s??'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    document.getElementById('muralNoticias').innerHTML = NOTICIAS.map(n => {
      const [c,bg] = CORES[n.cor] || CORES.cinza;
      return `
        <div class="news-item">
          <div class="d-flex align-items-center gap-2 flex-wrap">
            <span class="news-tag" style="color:${c};background:${bg};">${esc(n.tag)}</span>
            <span class="news-date">${esc(n.data)}</span>
          </div>
          <div class="news-title">${esc(n.titulo)}</div>
          <div class="news-text">${esc(n.texto)}</div>
        </div>`;
    }).join('') || '<div class="news-item text-muted">Sem novidades por enquanto.</div>';
  </script>
</body>
</html>
