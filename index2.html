<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MAPA — SME Ribeirão Preto</title>

  <script>
    /* ════════════════════════════════════════════════════════════
       CONFIGURAÇÃO — Página inicial do MAPA
       Troque o valor abaixo pela página que deve abrir primeiro:
         'avaliacao.html'    → Avaliações / Rede
         'atribuicao2.html'  → Atribuição de Aulas
         'elefante2.html'    → Elefante Letrado
         'fluencia2.html'    → Fluência Leitora
       ════════════════════════════════════════════════════════════ */
    const PAGINA_INICIAL = 'fluencia2.html';

    // Lançador: redireciona para a página inicial (sem entrar no histórico).
    // Se vier com #algo (ex.: index2.html#Configuracoes), repassa o hash.
    location.replace(PAGINA_INICIAL + (location.hash || ''));
  </script>

  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: grid; place-items: center;
      font-family: 'Inter', system-ui, sans-serif;
      background: #002b5e; color: #fff;
    }
    .box { text-align: center; opacity: .9; }
    .spin {
      width: 34px; height: 34px; margin: 0 auto 14px;
      border: 3px solid rgba(255,255,255,.25);
      border-top-color: #00e5ff; border-radius: 50%;
      animation: r .8s linear infinite;
    }
    @keyframes r { to { transform: rotate(360deg); } }
    a { color: #00e5ff; font-weight: 700; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spin"></div>
    <div style="font-weight:900;letter-spacing:.04em;">MAPA</div>
    <div style="font-size:.8rem;opacity:.7;margin-top:4px;">Abrindo o módulo…</div>
    <noscript>
      <p style="margin-top:12px;">Ative o JavaScript ou <a href="avaliacao.html">entre aqui</a>.</p>
    </noscript>
  </div>
</body>
</html>
